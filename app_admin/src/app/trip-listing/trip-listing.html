<div class="row mb-3">
  <div class="col-12">
    <button class="btn btn-primary"
        (click)="addTrip()"
        *ngIf="isLoggedIn()">
  Add Trip
</button>
  </div>
</div>

<div class="row">
  <div *ngFor="let trip of trips" class="col-md-4">
    <app-trip-card [trip]="trip"></app-trip-card>
  </div>
</div>
